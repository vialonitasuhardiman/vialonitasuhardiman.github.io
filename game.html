<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        header {
            background-color: #4a69bd;
            padding: 20px;
            color: white;
            text-align: center;
        }
        .content {
            margin: 20px 0;
        }
        h2 {
            color: #4a69bd;
        }
        p {
            text-align: justify;
            line-height: 1.6;
        }
        footer {
            background-color: #4a69bd;
            color: white;
            text-align: center;
            padding: 10px 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Games</h1>
    </header>

    <div class="container">
        <div class="content">
            <h2>Games I offer you</h2>
            <p>Here are some games I offer you.</p>
            <p>Pro tip : Click on the games name to go to the game.</p>
            <a href="snake.html">Snake game</a>
            <a href="pong.html">Pong</a>
            <a href="tetris.html">Tetris</a>
            
        </div>
    </div>

    <footer>
        <p>© 2024 Gabriel Nathaniel Pen's Hobbies</p>
    </footer>

    <script>
        // Example JS: A simple script that might change the background color of the header on click
        document.querySelector('header').addEventListener('click', function() {
            this.style.backgroundColor = this.style.backgroundColor === 'rgba(58, 83, 155, 1)' ? '#4a69bd' : 'rgba(58, 83, 155, 1)';
        });
    </script>

</body>
</html>
