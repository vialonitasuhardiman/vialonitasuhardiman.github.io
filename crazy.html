<!DOCTYPE html>
<html>
<head>
  <title>Made with ❤️ by Gabriel Pen 5.2</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <iframe src="https://api.allorigins.win/raw?url=https://www.crazygames.com/" frameborder="0"></iframe>
  <script>
    // Set the iframe to full screen
    const iframe = document.querySelector('iframe');
    iframe.width = window.innerWidth;
    iframe.height = window.innerHeight;
  </script>
</body>
</html>
