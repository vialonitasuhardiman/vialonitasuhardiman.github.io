<!DOCTYPE html>
<html>
<head>
  <title>Made with ❤️ by Gabriel Pen 5.2</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <iframe src="https://api.allorigins.win/raw?url=https://www.crazygames.com/" frameborder="0"></iframe>
  <script>
    // Set the iframe to full screen
    const iframe = document.querySelector('iframe');
    iframe.width = window.innerWidth;
    iframe.height = window.innerHeight;

    // Modify the iframe's src attribute to use the proxy URL for all links
    const proxyUrl = 'https://api.allorigins.win/raw?url=';
    const iframeDoc = iframe.contentDocument;
    const links = iframeDoc.querySelectorAll('a');

    links.forEach(link => {
      const href = link.getAttribute('href');
      if (href.startsWith('http')) {
        link.setAttribute('href', proxyUrl + href);
      }
    });
  </script>
</body>
</html>
